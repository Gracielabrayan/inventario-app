steps:
    - name: Descargar código
      uses: actions/checkout@v4

    - name: Preparar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Mantenemos estabilidad

    - name: Instalar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar Flutter
      uses: subosito/flutter-action@v2
      with:
        # Forzamos la versión que te pidió el log
        flutter-version: '3.41.4' 

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flet

    - name: Crear archivo de credenciales
      run: |
        mkdir -p assets
        echo '${{ secrets.GCP_CREDENTIALS }}' > assets/credentials.json

    - name: Construir la APK
      run: |
        # El comando 'yes' le dice que SI a cualquier pregunta automática
        yes | flet build apk --verbose --org "com.inventario.app"
