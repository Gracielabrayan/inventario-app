name: Construir APK de Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          # Usamos la versión estable más reciente para evitar que Flet se queje
          flutter-version: '3.24.x' 

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install flet gspread google-auth

      - name: Crear carpeta assets y credenciales
        run: |
          mkdir -p assets
          echo '${{ secrets.GCP_CREDENTIALS }}' > assets/credentials.json

      - name: Construir la APK
        run: |
          flet build apk --verbose --org "com.inventario.app"

      - name: Subir la APK lista
        uses: actions/upload-artifact@v4
        with:
          name: app-inventario-release
          path: build/apk/*.apk
