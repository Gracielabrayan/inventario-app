name: Construir APK de Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código
      uses: actions/checkout@v4

    - name: Preparar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Java (Necesario para Android SDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.x'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        # Usamos tu requirements.txt para que no falte nada
        pip install -r requirements.txt
        pip install flet

    - name: Create credentials file
      run: |
        mkdir -p assets
        # Importante: Las comillas simples evitan que se rompa el JSON
        echo '${{ secrets.GCP_CREDENTIALS }}' > assets/credentials.json

    - name: Construir la APK
      run: |
        # Agregamos verbose para ver el error real si falla
        flet build apk --verbose --org "com.inventario.app" --no-rich

    - name: Subir la APK lista
      uses: actions/upload-artifact@v4
      with:
        name: app-inventario-release
        # Ruta estándar de salida de Flet
        path: build/apk/*.apk
